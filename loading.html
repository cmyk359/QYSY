<div id="__app-loading__" class="app-loading">
  <div class="app-loading-content">
    <img src="/logo.svg" alt="logo" class="loading-logo" />
    <div class="loading-text">擎源数云</div>
  </div>
</div>

<script>
  // 检测 dark 模式并应用到 loading
  ;(function () {
    // 从 localStorage 读取主题模式
    const themeMode = localStorage.getItem('themeMode') || 'light'
    const isDark = themeMode === 'dark'

    // 如果 html 标签已经有 dark 类，也认为是 dark 模式
    const htmlHasDark = document.documentElement.classList.contains('dark')

    if (isDark || htmlHasDark) {
      document.documentElement.classList.add('dark')
      const loadingEl = document.getElementById('__app-loading__')
      if (loadingEl) {
        loadingEl.classList.add('dark-mode')
      }
    }
  })()
</script>

<style>
  .app-loading {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    z-index: 99999;
    transition: background-color 0.3s ease;
  }

  .app-loading-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    /* 确保内容容器有固定尺寸，防止布局变化 */
    min-height: 160px; /* logo高度 + gap + 文字高度 */
  }

  @media (max-width: 992px) {
    .loading-logo {
      width: 80px;
      height: 80px;
    }
    .app-loading-content {
      min-height: 140px; /* 调整响应式高度 */
    }
  }

  .loading-logo {
    width: 120px;
    height: 120px;
    transform: scale(1);
    opacity: 1;
    will-change: transform, opacity;
    animation: logoBlink 1.5s ease-in-out infinite;
  }

  @keyframes logoBlink {
    0% {
      transform: scale(1);
      opacity: 1;
    }
    25% {
      transform: scale(1);
      opacity: 0.7;
    }
    50% {
      transform: scale(1);
      opacity: 1;
    }
    75% {
      transform: scale(1);
      opacity: 0.7;
    }
    100% {
      transform: scale(1);
      opacity: 1;
    }
  }

  .loading-text {
    color: #666;
    font-size: 32px;
    font-weight: 600;
    transition: color 0.3s ease;
    letter-spacing: 1px;
    /* 固定文字高度，防止渲染时的跳动 */
    height: 1.5em; /* 固定行高 */
    line-height: 1.5em; /* 确保文字垂直居中 */
    /* 防止文字换行 */
    white-space: nowrap;
    /* 确保文字不会影响布局 */
    display: inline-block;
    /* 添加平滑过渡 */
    transition: all 0.3s ease;
    /* 预设字体大小，防止字体加载时的布局抖动 */
    visibility: hidden; /* 初始隐藏，等字体加载完成后再显示 */
    /* 添加字体加载完成后的显示动画 */
    animation: textFadeIn 0.5s ease forwards;
    animation-delay: 0.2s; /* 稍微延迟显示，确保字体加载 */
  }

  @keyframes textFadeIn {
    from {
      visibility: visible;
      opacity: 0;
    }
    to {
      visibility: visible;
      opacity: 1;
    }
  }

  @media (max-width: 992px) {
    .loading-text {
      font-size: 24px;
    }
  }

  /* Dark 模式样式 */
  .app-loading.dark-mode {
    background: #1d1e1f;
  }

  .app-loading.dark-mode .loading-text {
    color: #a8abb2;
  }

  /* 或者使用 html.dark 选择器（如果 useDark 已经添加了 dark 类） */
  html.dark .app-loading {
    background: #1d1e1f;
  }

  html.dark .app-loading .loading-text {
    color: #a8abb2;
  }

  /* 应用加载完成后隐藏 */
  .app-loading.hidden {
    display: none;
  }
</style>
